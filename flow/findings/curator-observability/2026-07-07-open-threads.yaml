  - id: OT1
    topic: Does pi-curator ship a sophisticated logging mechanism?
    raised_in: turn1
    status: resolved
    resolution: >
      NO. No logging library, no logs/ dir, stdio is IGNORE/IGNORE/IGNORE.
      D11 (stderr→logs) decided in design but not honored in code.
    resolved_in: turn1

  - id: OT2
    topic: How does an operator check what ran / results for troubleshooting?
    raised_in: turn1
    status: resolved
    resolution: >
      pids/<sess>/<cur>.json gives existence + liveness + phase.
      Curator reasoning/conclusions live in the pi session JSONL
      (~/.pi/agent/sessions/), findable by name "curator:<alias>" via pi --resume.
      Remaining sub-gaps tracked as OT3/OT4/OT5/OT6.
    resolved_in: turn2

